ReleaseNotes: |-
  Version 3.5.0 - Major Release

  New Features:
  • Plan Auto-Detection: Analyzes usage history to suggest the correct plan
  • CSV Export: Export sessions and model summaries with --export flag
  • Session History View: View individual sessions with --view sessions
  • OS Notifications: Alerts at 70%, 80%, 95% token usage thresholds
  • Terminal Icon Detection: Automatically selects modern or ASCII icon sets
  • Smarter Warnings: Enhanced approaching-limit warning logic

  Improvements:
  • Better data analysis and persistence
  • Enhanced keyword analytics with file caching
  • Improved window title for standalone binaries
  • Better first-run experience with guided setup

  Bug Fixes:
  • Fixed layout rendering on terminal resize
  • Corrected terminal capability detection
  • Improved data loading performance

