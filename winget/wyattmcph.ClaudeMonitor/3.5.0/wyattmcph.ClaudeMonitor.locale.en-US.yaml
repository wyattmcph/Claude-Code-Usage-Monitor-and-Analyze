ShortDescription: Real-time terminal monitor for Claude Code token usage
Description: |-
  A fast, beautiful terminal monitor for real-time Claude Code token usage tracking.
  Features live token/cost display, keyword analytics, animated UI, and model-specific stats.

  Features:
  • Real-time token and cost tracking (Pro, Max 5, Max 20, or Custom plans)
  • Keyword analytics panel to track usage by project/topic
  • Animated gradient UI with light/dark/classic themes
  • Adaptive layout (NANO to FULL depending on terminal size)
  • OS notifications at 70%, 80%, 95% token usage
  • Session history view and CSV export capabilities
  • Smart plan auto-detection from usage history
  • Cross-platform: Windows, macOS, Linux
  • Popup/Picture-in-Picture mode for overlay on Claude workspace

